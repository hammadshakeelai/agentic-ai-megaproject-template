<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentic AI Mega-Project Template — phase-gated lifecycle, state-file memory, traceability chain, CI gates">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#101B33"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="55%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="pipeline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="60%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <circle cx="960" cy="40" r="300" fill="url(#glowTeal)"/>
  <circle cx="140" cy="290" r="280" fill="url(#glowViolet)"/>
  <rect width="1200" height="4" fill="url(#accentBar)"/>

  <!-- status chips -->
  <g font-family="Consolas, Menlo, monospace" font-size="12" fill="#C9D6EA">
    <rect x="792" y="30" width="100" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="842" y="48" text-anchor="middle">MIT License</text>
    <rect x="902" y="30" width="122" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="963" y="48" text-anchor="middle">Template Repo</text>
    <rect x="1034" y="30" width="106" height="28" rx="14" fill="#2DD4BF" fill-opacity="0.08" stroke="#2DD4BF" stroke-opacity="0.35"/>
    <text x="1087" y="48" text-anchor="middle" fill="#7EE8DA">Docs CI ✓</text>
  </g>

  <!-- title -->
  <text x="60" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#E8EEF9">
    <tspan fill="#2DD4BF">Agentic AI</tspan> Mega-Project Template
  </text>
  <text x="60" y="152" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#9FB3D1">
    A topic-agnostic starter kit for super-large software projects — AI agents as the workforce, humans as directors.
  </text>
  <text x="60" y="182" font-family="Consolas, Menlo, monospace" font-size="13.5" fill="#6FD3C7">
    phase-gated lifecycle · state-file memory · traceability chain · work packets · adversarial ADRs · CI gates
  </text>

  <!-- phase pipeline -->
  <line x1="80" y1="228" x2="1120" y2="228" stroke="#33415C" stroke-width="1.5"/>
  <line x1="80" y1="228" x2="1120" y2="228" stroke="url(#pipeline)" stroke-width="1.5" stroke-opacity="0.35"/>
  <g>
    <circle cx="80"   cy="228" r="5.5" fill="#2DD4BF"/>
    <circle cx="184"  cy="228" r="5.5" fill="#3BCBD0"/>
    <circle cx="288"  cy="228" r="5.5" fill="#46C4DD"/>
    <circle cx="392"  cy="228" r="5.5" fill="#4FBBE8"/>
    <circle cx="496"  cy="228" r="5.5" fill="#58A6FF"/>
    <circle cx="600"  cy="228" r="5.5" fill="#6E9EFC"/>
    <!-- Phase 6: the coding gate -->
    <rect x="697" y="221" width="14" height="14" fill="#8494F8" transform="rotate(45 704 228)"/>
    <!-- Phase 7: the construction loop -->
    <circle cx="808" cy="228" r="5.5" fill="#A78BFA"/>
    <circle cx="808" cy="228" r="10" stroke="#A78BFA" stroke-opacity="0.45" stroke-width="1.5"/>
    <path d="M 799 213 A 12 12 0 1 1 819 216" stroke="#A78BFA" stroke-width="1.5" fill="none" stroke-opacity="0.8"/>
    <path d="M 819 216 l -6 -1.5 M 819 216 l 1 -6" stroke="#A78BFA" stroke-width="1.5" stroke-opacity="0.8"/>
    <circle cx="912"  cy="228" r="5.5" fill="#A78BFA"/>
    <circle cx="1016" cy="228" r="5.5" fill="#B491F7"/>
    <circle cx="1120" cy="228" r="5.5" fill="#C29AF5"/>
  </g>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#8CA0C0" text-anchor="middle">
    <text x="80"   y="254">Inception</text>
    <text x="184"  y="254">Research</text>
    <text x="288"  y="254">SRS</text>
    <text x="392"  y="254">ADRs</text>
    <text x="496"  y="254">Design</text>
    <text x="600"  y="254">QA Gates</text>
    <text x="704"  y="254" fill="#AAB8F0">Scaffold</text>
    <text x="808"  y="254" fill="#C4B5FD">Build Loop</text>
    <text x="912"  y="254">Harden</text>
    <text x="1016" y="254">Release</text>
    <text x="1120" y="254">Operate</text>
  </g>
  <text x="704" y="278" font-family="Consolas, Menlo, monospace" font-size="10.5" fill="#5D6E8F" text-anchor="middle">◆ pre-code audit gate — no production code before this point</text>
</svg>
